<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Luyện Tập Toán - Thầy Quang</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; background-color: #f4f7f9; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        .quiz-container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .question { margin-bottom: 25px; padding: 15px; border-bottom: 1px solid #eee; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .options li:hover { background-color: #e3f2fd; }
        .selected { background-color: #bbdefb !important; border-color: #2196f3 !important; }
        button { display: block; width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background: #219150; }
        #result { margin-top: 20px; text-align: center; font-weight: bold; font-size: 20px; }
        .correct { color: #27ae60; }
        .wrong { color: #e74c3c; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>📝 PHIẾU BÀI TẬP TỰ LUYỆN</h1>
    <div id="quiz">
        </div>
    <button onclick="submitQuiz()">Nộp bài</button>
    <div id="result"></div>
</div>

<script>
    const quizData = [
        	\section{ĐỀ 1 - Lớp Toán Thầy QuangLX}
	\subsection{Câu trắc nghiệm nhiều phương án lựa chọn}
	\textit{Thí sinh trả lời từ câu 1 đến câu 12, mỗi câu hỏi học sinh chỉ chọn một phương án.}
	\setcounter{ex}{0}
	
	\begin{ex}
		Mỗi ngày bác Sơn đều đi bộ để rèn luyện sức khỏe. Quãng đường đi bộ mỗi ngày (đơn vị: km) của bác Sơn được thống kê ở bảng sau:
		\begin{center}
			\begin{tabular}{|l|c|c|c|c|c|}
				\hline
				Quãng đường (km) & $[2,7; 3,0)$ & $[3,0; 3,3)$ & $[3,3; 3,6)$ & $[3,6; 3,9)$ & $[3,9; 4,2)$ \\
				\hline
				Số ngày & 3 & 6 & 5 & 4 & 2 \\
				\hline
			\end{tabular}
		\end{center}
		Khoảng tứ phân vị của mẫu số liệu ghép nhóm trên là
		\choice
		{$0,975$}
		{$0,5$}
		{$0,9$}
		{$0,575$}
	\end{ex}
	
	\begin{ex}
		Trong không gian $Oxyz$, cho vectơ $\vec{u}=2\vec{i}-5\vec{k}$. Tọa độ của vectơ $\vec{u}$ là
		\choice
		{$(2; -5; 0)$}
		{$(0; 2; -5)$}
		{$(2; 0; 5)$}
		{$(2; 0; -5)$}
	\end{ex}
	
	\begin{ex}
		Cho cấp số nhân $(u_n)$ có $u_1=2$ và $u_2=6$. Số hạng $u_4$ của cấp số nhân đó là
		\choice
		{$27$}
		{$54$}
		{$162$}
		{$11$}
	\end{ex}
	
	\begin{ex}
		Cho hình lập phương $ABCD.A_1B_1C_1D_1$. Phát biểu nào sau đây đúng? 
		% [Chèn hình vẽ lập phương tại đây]
		\choice
		{$\vec{AC_1}=\vec{AA_1}+\vec{AB}$}
		{$\vec{AC_1}=\vec{AA_1}+\vec{A_1C}$}
		{$\vec{AC_1}=\vec{AA_1}+\vec{AB}+\vec{AD}$}
		{$\vec{AC_1}=\vec{AA_1}+\vec{CA_1}$}
	\end{ex}
	
	\begin{ex}
		Cho hàm số $y=f(x)$ thỏa mãn $f(1)=-2$, $f(2)=1$ và có đạo hàm liên tục trên đoạn $[1; 2]$. Giá trị của tích phân $I=\int_{1}^{2}f'(x)\mathrm{d}x$ là
		\choice
		{$I=-1$}
		{$I=2$}
		{$I=-3$}
		{$I=3$}
	\end{ex}
	
	\begin{ex}
		Họ tất cả các nguyên hàm của hàm số $y=\sin x+\cos x$ là
		\choice
		{$\int(\sin x+\cos x)\mathrm{d}x = \sin x+\cos x+C$}
		{$\int(\sin x+\cos x)\mathrm{d}x = -\sin x-\cos x+C$}
		{$\int(\sin x+\cos x)\mathrm{d}x = -\sin x+\cos x+C$}
		{$\int(\sin x+\cos x)\mathrm{d}x = \sin x-\cos x+C$}
	\end{ex}
	
	\begin{ex}
		Tiệm cận đứng của đồ thị hàm số $y=\frac{2x-1}{x-1}$ là đường thẳng có phương trình: 
		\choice
		{$y=1$}
		{$x=1$}
		{$y=2$}
		{$x=2$}
	\end{ex}
	
	\begin{ex}
		Cho mặt phẳng $(P): 3x-y+z-2=0$. Vectơ nào trong các vectơ dưới đây là một vectơ pháp tuyến của mặt phẳng $(P)$? 
		\choice
		{$\vec{n}=(3;-1;1)$}
		{$\vec{n}=(3;-1;2)$}
		{$\vec{n}=(3;-1;-2)$}
		{$\vec{n}=(3;-1;0)$}
	\end{ex}
	
	\begin{ex}
		Nghiệm của phương trình $\log_{2}(x+1)=3$ là
		\choice
		{$x=9$}
		{$x=7$}
		{$x=8$}
		{$x=5$}
	\end{ex}
	
	\begin{ex}
		Tập nghiệm của phương trình $\cos x=1$ là
		\choice
		{$S=\{k2\pi|k\in\mathbb{Z}\}$}
		{$S=\{\frac{\pi}{2}+k2\pi|k\in\mathbb{Z}\}$}
		{$S=\{\frac{\pi}{2}+k\pi|k\in\mathbb{Z}\}$}
		{$S=\{k\pi|k\in\mathbb{Z}\}$}
	\end{ex}
	
	\begin{ex}
		Cho hình lăng trụ $ABC.A'B'C'$ như hình vẽ. Đường thẳng nào sau đây song song với mặt phẳng $(ACC'A')$? 
		% [Chèn hình vẽ lăng trụ tam giác tại đây]
		\begin{center}
			\begin{tikzpicture}[line join=round, line cap=round, thick, red]
				% Khai báo tọa độ các đỉnh đáy trên
				\coordinate (A) at (0,3);
				\coordinate (B) at (3.5, 3.5);
				\coordinate (C) at (1.2, 2);
				
				% Khai báo các đỉnh đáy dưới (tịnh tiến xuống dưới 3 đơn vị)
				\coordinate (A') at (0,0);
				\coordinate (B') at (3.5, 0.5);
				\coordinate (C') at (1.2, -1);
				
				% Vẽ các cạnh thấy (nét liền)
				\draw (A) -- (B) -- (C) -- cycle; % Đáy trên
				\draw (A') -- (C') -- (B');       % Hai cạnh đáy dưới
				\draw (A) -- (A');                % Các cạnh bên
				\draw (B) -- (B');
				\draw (C) -- (C');
				
				% Vẽ cạnh khuất (nét đứt)
				\draw[dashed] (A') -- (B');
				
				% Gắn nhãn các đỉnh
				\node[left] at (A) {$A$};
				\node[right] at (B) {$B$};
				\node[below left=2pt] at (C) {$C$};
				\node[left] at (A') {$A'$};
				\node[right] at (B') {$B'$};
				\node[below=2pt] at (C') {$C'$};
			\end{tikzpicture}
		\end{center}
		\choice
		{$AA'$}
		{$BB'$}
		{$AC$}
		{$AB$}
	\end{ex}
	
	\begin{ex}
		Cho hình chóp $S.ABC$ có $SA\perp(ABC)$; $SA=3$; $\Delta ABC$ vuông cân tại $A$ với $AB=4$. Thể tích khối chóp $S.ABC$ bằng
		\choice
		{$48$}
		{$16$}
		{$8$}
		{$24$}
	\end{ex}
	
	\subsection{Câu trắc nghiệm đúng sai}
	\textit{Thí sinh trả lời từ câu 1 đến câu 4. Mỗi ý a) b) c) d) thí sinh chọn đúng hoặc sai.}
	\setcounter{ex}{0}
	
	\begin{ex}
		Cho hàm số $f(x)=x^3+3x^2-4$.
		\begin{center}
			\begin{tikzpicture}[>=stealth, line join=round, line cap=round]
				% Định nghĩa vùng hiển thị để đồ thị không bị tràn ra ngoài
				\clip (-4.8, -4.8) rectangle (3, 3);
				
				% Vẽ trục tọa độ Ox, Oy
				\draw[->] (-4.5,0) -- (2.5,0) node[below] {$x$};
				\draw[->] (0,-4.5) -- (0,2.8) node[left] {$y$};
				\node[below left] at (0,0) {$0$};
				
				% Chia vạch và ghi số trên trục Ox
				\foreach \x in {-4, -3, -2, -1, 1, 2} {
					\draw (\x, 0.05) -- (\x, -0.05) node[below] {$\x$};
				}
				
				% Chia vạch và ghi số trên trục Oy
				\foreach \y in {-4, -3, -2, -1, 1, 2} {
					\draw (0.05, \y) -- (-0.05, \y) node[left] {$\y$};
				}
				
				% Vẽ đường cong đồ thị y = x^3 + 3x^2 - 4
				\draw[thick, smooth, samples=100, domain=-3.15:1.25] plot (\x, {(\x)^3 + 3*(\x)^2 - 4});
				
			\end{tikzpicture}
		\end{center}
		\choiceTF
		{Hàm số đã cho có đạo hàm là $f'(x)=3x^2+6x$.}
		{Hàm số đã cho đồng biến trên khoảng $(-1;+\infty)$.}
		{Hàm số đã cho đạt cực đại tại $x=-2$.}
		{Đồ thị của hàm số đã cho có dạng như hình vẽ sau.} % [Chèn đồ thị bậc 3 tại đây]}
	\end{ex}
	
	\begin{ex}
		Tại tỉnh X, $20\%$ dân số thường xuyên chơi thể thao. Trong số những người thường xuyên chơi thể thao, có $70\%$ người có thể lực tốt. Trong số những người không thường xuyên chơi thể thao, có $15\%$ có thể lực tốt. Chọn ngẫu nhiên một người dân tỉnh X.
		\choiceTF
		{Xác suất người đó có thể lực tốt và thường xuyên chơi thể thao là $0,14$.}
		{Xác suất người đó có thể lực tốt, biết rằng người đó không thường xuyên chơi thể thao là $0,15$.}
		{Tỉ lệ người có thể lực tốt trong toàn tỉnh X là $36\%$.}
		{Xác suất người đó thường xuyên chơi thể thao, biết rằng họ có thể lực tốt là $\frac{8}{13}$.}
	\end{ex}
	
	\begin{ex}
		Giả sử lợi nhuận biên (tính bằng triệu đồng) của một sản phẩm được mô hình hóa bằng công thức $P'(x)=-0,0008x+10,4$. Ở đây $P(x)$ là lợi nhuận (tính bằng triệu đồng) khi bán được $x$ đơn vị sản phẩm.
		\choiceTF
		{Lợi nhuận khi bán được $x$ đơn vị sản phẩm được tính bằng công thức $P(x)=-0,0004x^2+10,4x$.}
		{Lợi nhuận khi bán được 50 sản phẩm đầu tiên là 519 triệu đồng.}
		{Sự thay đổi của lợi nhuận khi doanh số tăng từ 50 lên 55 đơn vị sản phẩm là 49,79 triệu đồng.}
		{Biết sự thay đổi của lợi nhuận khi doanh số tăng từ 50 lên $a$ đơn vị sản phẩm lớn hơn 517 triệu đồng, khi đó giá trị nhỏ nhất của $a$ là 100.}
	\end{ex}
	
    ];

    function loadQuiz() {
        const quizDiv = document.getElementById('quiz');
        quizDiv.innerHTML = quizData.map((q, qIdx) => `
            <div class="question">
                <p><strong>${q.question}</strong></p>
                <ul class="options" id="q${qIdx}">
                    ${q.options.map((opt, oIdx) => `
                        <li onclick="selectOption(${qIdx}, ${oIdx})">${opt}</li>
                    `).join('')}
                </ul>
            </div>
        `).join('');
    }

    let userAnswers = {};

    function selectOption(qIdx, oIdx) {
        userAnswers[qIdx] = oIdx;
        const options = document.querySelectorAll(`#q${qIdx} li`);
        options.forEach(li => li.classList.remove('selected'));
        options[oIdx].classList.add('selected');
    }

    function submitQuiz() {
        let score = 0;
        quizData.forEach((q, i) => {
            if (userAnswers[i] === q.answer) score++;
        });
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `Bạn đúng ${score}/${quizData.length} câu!`;
        resultDiv.className = score === quizData.length ? 'correct' : 'wrong';
    }

    loadQuiz();
</script>

</body>
</html>
